<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Empleados | Buena Burger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/empleados.css">
    <script>
        (function() {
            const token = localStorage.getItem('bb_token');
            const rol   = localStorage.getItem('bb_rol');
            if (!token || (rol !== 'ADMIN' && rol !== 'EMPLEADO')) {
                window.location.replace('/index.html');
                return;
            }
            const _fetch = window.fetch;
            window.fetch = async function(...args) {
                const res = await _fetch.apply(this, args);
                if (res.status === 401) {
                    localStorage.removeItem('bb_token');
                    localStorage.removeItem('bb_rol');
                    localStorage.removeItem('bb_nombre');
                    window.location.replace('/index.html');
                }
                return res;
            };
        })();
    </script>
</head>

<body>

    <!-- ── Header ── -->
    <header class="emp-header">
        <div class="emp-header-left">
            <img src="images/logo_clean.png" alt="Buena Burger" class="emp-logo">
            <span class="emp-title">PANEL DE GESTIÓN</span>
        </div>
        <div class="emp-header-right">
            <span id="emp-nombre">Cargando...</span>
            <span id="emp-rol" class="badge-rol"></span>
            <a href="/pos.html" class="btn-pos">🧾 IR AL TPV</a>
            <button class="btn-salir" onclick="cerrarSesion()">SALIR</button>
        </div>
    </header>

    <div class="emp-body">

        <!-- ── Columna izquierda: Bloques ── -->
        <aside class="panel-bloques">
            <div class="panel-bloques-header">
                <h2>BLOQUES DEL DÍA</h2>
                <input type="date" id="selector-fecha" onchange="cargarDatos()">
            </div>
            <div id="lista-bloques" class="lista-bloques">
                <div class="loading">Cargando bloques...</div>
            </div>
        </aside>

        <!-- ── Columna derecha: Pedidos del bloque ── -->
        <main class="panel-pedidos">
            <div class="panel-pedidos-header">
                <div>
                    <h2 id="pedidos-titulo">Selecciona un bloque</h2>
                    <p id="pedidos-subtitulo" class="subtitulo">← Haz click en una hora para ver sus pedidos</p>
                </div>
                <div class="panel-pedidos-actions" id="pedidos-actions" style="display:none">
                    <span id="pedidos-count" class="badge-count">0 pedidos</span>
                </div>
            </div>
            <div id="lista-pedidos" class="lista-pedidos">
                <div class="empty-state">
                    <div class="empty-icon">📋</div>
                    <p>Selecciona un bloque horario para ver sus pedidos</p>
                </div>
            </div>
        </main>

    </div>

    <!-- ── Modal Detalle / Cancelar ── -->
    <div id="modal-pedido" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-titulo">Pedido #XXX</h3>
                <button class="modal-close" onclick="cerrarModal()">✕</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-cancelar-pedido" id="btn-cancelar-pedido" onclick="cancelarPedido()">🗑 Cancelar
                    pedido</button>
                <button class="btn-modificar-pedido" id="btn-modificar-pedido" onclick="modificarPedidoEmpleado()">✏️ Modificar</button>
                <button class="btn-gris" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- ── Toast ── -->
    <div id="toast" class="toast"></div>

    <script src="js/bb-safe.js"></script>
    <script src="js/empleados.js"></script>
</body>

</html>
