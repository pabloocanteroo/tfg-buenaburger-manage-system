<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS | Buena Burger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/pos.css">
</head>

<body>
    <div id="pos-container">

        <!-- ── Header ── -->
        <header class="pos-header">
            <div class="pos-header-left">
                <img src="images/logo_clean.png" alt="Buena Burger" class="pos-logo">
                <span class="pos-title">SISTEMA TPV</span>
            </div>
            <div class="pos-header-right">
                <span id="pos-empleado-nombre">Empleado: Cargando...</span>
                <span id="pos-hora-actual">00:00:00</span>
                <button class="btn-panel" onclick="volverAlPanel()">← PANEL</button>
                <button class="btn-salir" onclick="cerrarSesionPOS()">SALIR</button>
            </div>
        </header>

        <div class="pos-body">

            <!-- ── COL 1: Multiplicadores + Productos + Form abajo ── -->
            <main class="pos-main">
                <div class="pos-multipliers">
                    <button class="btn-multi active" data-val="1">1</button>
                    <button class="btn-multi" data-val="2">2</button>
                    <button class="btn-multi" data-val="3">3</button>
                    <button class="btn-multi" data-val="4">4</button>
                    <button class="btn-multi" data-val="5">5</button>
                    <button class="btn-multi" data-val="6">6</button>
                    <button class="btn-multi" data-val="7">7</button>
                    <button class="btn-multi" data-val="8">8</button>
                    <button class="btn-multi" data-val="9">9</button>
                    <button class="btn-multi btn-reset-multi" onclick="resetMulti()">✕</button>
                </div>
                <div class="pos-grid" id="pos-grid">
                    <div class="pos-loading">Cargando catálogo...</div>
                </div>
                <!-- Form compacto en la parte baja de la columna izquierda -->
                <div class="pos-form-bottom">
                    <div class="pos-form-total">
                        <span class="form-total-label">TOTAL</span>
                        <span class="form-total-valor" id="ticket-total">0.00€</span>
                    </div>
                    <div class="pos-form-inputs">
                        <input type="text" id="cliente-nombre" placeholder="👤 Nombre" autocomplete="off">
                        <input type="tel"  id="cliente-telefono" placeholder="📞 Teléfono" autocomplete="off">
                    </div>
                    <div class="pos-form-actions">
                        <label class="check-forzar">
                            <input type="checkbox" id="check-forzar">
                            ⚡ FORZAR
                        </label>
                        <button class="btn-cobrar" id="btn-cobrar" onclick="cobrarPedido()">ENVIAR PEDIDO</button>
                    </div>
                </div>
            </main>

            <!-- ── COL 2: Bloques horarios (espacio central grande) ── -->
            <section class="pos-bloques-col">
                <div class="bloques-col-header">🕐 HORA DE RECOGIDA</div>
                <div class="ticket-bloques" id="ticket-bloques">
                    <p style="color:#888;padding:14px;grid-column:1/-1;text-align:center">Cargando horas...</p>
                </div>
            </section>

            <!-- ── COL 3: Ticket (barra derecha fina) ── -->
            <aside class="pos-sidebar">
                <div class="ticket-header">
                    <h3>🧾 TICKET</h3>
                </div>
                <div class="ticket-items" id="ticket-items">
                    <div class="ticket-empty">El ticket está vacío</div>
                </div>
            </aside>

        </div>
    </div>

    <!-- Modal Personalización -->
    <div id="modal-personalizacion" class="pos-modal-overlay" style="display:none">
        <div class="pos-modal">
            <h2 id="modal-p-titulo">Personalizar Item</h2>

            <!-- Stepper de cuántas unidades personalizar (solo visible si cantidad > 1) -->
            <div id="modal-split-wrap" style="display:none; margin-bottom:12px; padding:10px 0; border-bottom:1px solid #eee;">
                <h3 style="margin-bottom:8px;">¿Cuántas personalizar?</h3>
                <div style="display:flex;align-items:center;gap:14px;">
                    <button class="btn-rojo" style="padding:4px 14px;border-radius:8px;font-size:1.1rem;" onclick="ajustarSplit(-1)">−</button>
                    <span id="modal-split-qty" style="font-family:var(--font);font-size:1.6rem;font-weight:900;min-width:28px;text-align:center;">1</span>
                    <button class="btn-rojo" style="padding:4px 14px;border-radius:8px;font-size:1.1rem;" onclick="ajustarSplit(1)">+</button>
                    <span id="modal-split-info" style="font-size:.82rem;color:#888;"></span>
                </div>
            </div>

            <div id="modal-p-remover">
                <h3>Quitar ingredientes</h3>
                <div class="chips-container" id="chips-quitar"></div>
            </div>
            <div id="modal-p-extras">
                <h3>Añadir extras</h3>
                <div class="extras-grid" id="grid-extras"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-rojo" onclick="cerrarModalesPOS(false)">Cancelar</button>
                <button class="btn-verde" id="btn-guardar-personalizacion" onclick="cerrarModalesPOS(true)">✔ Guardar</button>
            </div>
        </div>
    </div>


    <div id="pos-toast" class="pos-toast"></div>
    <script src="js/pos.js"></script>
</body>

</html>
